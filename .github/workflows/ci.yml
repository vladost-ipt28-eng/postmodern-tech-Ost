name: Docker CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ТУТ ВИПРАВЛЕНО НА МАЛЕНЬКІ ЛІТЕРИ
          tags: ghcr.io/vladost-ipt28-eng/postmodern-tech-ost:latest

  test-docker:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        # ТУТ ТЕЖ ВИПРАВЛЕНО
        run: docker pull ghcr.io/vladost-ipt28-eng/postmodern-tech-ost:latest

      - name: Run tests inside container
        # І ТУТ
        run: docker run --rm ghcr.io/vladost-ipt28-eng/postmodern-tech-ost:latest